server:
  port: 80

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/javaeedb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    # 请修改为你的数据库用户名
    username: root
    # 请修改为你的数据库密码
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  # 开启驼峰命名转换 (数据库字段 user_name -> Java属性 userName)
  configuration:
    map-underscore-to-camel-case: true
